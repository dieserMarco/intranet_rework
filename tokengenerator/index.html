<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Hallo Welt</h1>
  <button id="btn">Klick mich</button>

  <script>
    document.getElementById("btn").addEventListener("click", () => {
      alert("Button geklickt!");
    });
  </script>
</body>
</html>
