<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Token Generator · FFWN</title>
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="stylesheet" href="./tokengenerator.css">
</head>
<body class="theme-dark">
  <div class="app-bg"></div>

  <div class="shell shell-form">
    <header class="app-header">
      <div class="header-brand">
        <a class="brand-badge" href="../index.php" aria-label="Zur Startseite">
          <img src="../resources/logo.png" alt="FFWN Logo" onerror="this.style.display='none'">
        </a>
        <div class="brand-text">
          <p class="brand-title">Freiwillige Feuerwehr Wiener Neustadt</p>
          <p class="brand-subtitle">Token Generator</p>
        </div>
      </div>

      <div class="header-actions">
        <nav class="header-nav" aria-label="Hauptnavigation">
          <a class="nav-link" href="../admin.php">Verwaltung</a>
          <a class="nav-link" href="../form.php">Formular</a>
          <a class="nav-link is-active" href="./">Token Generator</a>
        </nav>
        <button id="themeToggle" class="btn btn-ghost btn-small" type="button" aria-label="Theme wechseln">Theme</button>
      </div>
    </header>

    <p class="page-subtitle">Erstelle und speichere neue Tokens für Mitglieder.</p>

    <main class="layout-form">
      <section class="card form-card">
        <div class="card-head">
          <h1>Token Generator</h1>
          <p class="text-muted">Tokenformat: <strong>FFWN-XXXX-XX</strong> (Buchstaben + Zahlen).</p>
        </div>

        <form class="form-grid" id="tokenForm" autocomplete="off">
          <div class="field field-span-2">
            <label for="token">token *</label>
            <div class="inline-actions">
              <input class="input" id="token" name="token" required maxlength="12" pattern="^FFWN-[A-Z0-9]{4}-[A-Z0-9]{2}$" placeholder="FFWN-XXXX-XX">
              <button class="btn btn-ghost" id="generateToken" type="button">Token generieren</button>
            </div>
          </div>

          <div class="field">
            <label for="member_id">member_id</label>
            <input class="input" id="member_id" name="member_id" type="number" min="1">
          </div>

          <div class="field">
            <label for="status">status *</label>
            <select id="status" name="status" required>
              <option value="active">active</option>
              <option value="used">used</option>
              <option value="expired">expired</option>
              <option value="revoked">revoked</option>
            </select>
          </div>

          <div class="field">
            <label for="created_by">created_by *</label>
            <input class="input" id="created_by" name="created_by" type="number" min="1" required>
          </div>

          <div class="field">
            <label for="expires_at">expires_at</label>
            <input class="input" id="expires_at" name="expires_at" type="datetime-local">
          </div>

          <div class="field">
            <label for="used_at">used_at</label>
            <input class="input" id="used_at" name="used_at" type="datetime-local">
          </div>

          <div class="field">
            <label for="used_by_member_id">used_by_member_id</label>
            <input class="input" id="used_by_member_id" name="used_by_member_id" type="number" min="1">
          </div>

          <div class="field field-span-2">
            <label for="notes">Notiz</label>
            <input class="input" id="notes" name="notes" maxlength="500" placeholder="Notiz zum Token...">
          </div>

          <div class="actions">
            <button class="btn btn-ghost" type="reset">Zurücksetzen</button>
            <button class="btn btn-primary" type="submit">Token speichern</button>
          </div>
        </form>

        <p class="notice notice-info" id="resultMessage">Bitte Felder ausfüllen und speichern.</p>
      </section>
    </main>

    <footer class="app-footer">
      <small>© FFWN · Intranet Vorlage</small>
    </footer>
  </div>

  <script src="../../assets/js/theme.js"></script>
  <script src="./tokengenerator.js"></script>
</body>
</html>
